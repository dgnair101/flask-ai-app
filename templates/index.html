<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Assistant</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0f172a;
    --bg2:#1e1b4b;
    --panel:rgba(17,24,39,.88);
    --surface:#1e293b;
    --surface-light:#334155;
    --primary:#6366f1;
    --primary-hover:#4f46e5;
    --text:#f8fafc;
    --muted:#94a3b8;
    --danger:#ef4444;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Inter',sans-serif;

    background:
      radial-gradient(circle at top left,#312e81,#0f172a 50%),
      radial-gradient(circle at bottom right,#1e1b4b,#020617);

    overflow:hidden;
}

.chat-container{
    width:min(920px,95vw);
    height:92vh;

    display:flex;
    flex-direction:column;

    background:var(--panel);
    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.08);

    border-radius:28px;

    overflow:hidden;

    box-shadow:
      0 25px 60px rgba(0,0,0,.45);
}

.chat-header{
    display:flex;
    align-items:center;
    justify-content:space-between;

    padding:18px 24px;

    border-bottom:1px solid rgba(255,255,255,.05);

    background:rgba(255,255,255,.03);
}

.header-left{
    display:flex;
    align-items:center;
    gap:12px;
}

.bot-avatar{
    width:42px;
    height:42px;
    border-radius:50%;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:20px;

    background:linear-gradient(
      135deg,
      #6366f1,
      #8b5cf6
    );
}

.header-info h2{
    color:white;
    font-size:16px;
    font-weight:600;
}

.status{
    color:#22c55e;
    font-size:12px;
}

.chat-box{
    flex:1;
    overflow-y:auto;

    padding:24px;

    display:flex;
    flex-direction:column;
    gap:16px;

    scroll-behavior:smooth;
}

.chat-box::-webkit-scrollbar{
    width:8px;
}

.chat-box::-webkit-scrollbar-thumb{
    background:#334155;
    border-radius:20px;
}

.message-row{
    display:flex;
    animation:fadeIn .25s ease;
}

.message{
    max-width:75%;
    padding:14px 18px;

    border-radius:22px;

    line-height:1.6;
    font-size:15px;

    word-break:break-word;
}

.user-row{
    justify-content:flex-end;
}

.bot-row{
    justify-content:flex-start;
}

.user{
    background:
      linear-gradient(
      135deg,
      #6366f1,
      #8b5cf6);

    color:white;

    border-bottom-right-radius:6px;

    box-shadow:
      0 10px 24px rgba(99,102,241,.35);
}

.bot{
    background:var(--surface);
    color:var(--text);

    border-bottom-left-radius:6px;

    border:1px solid rgba(255,255,255,.05);
}

.timestamp{
    margin-top:6px;
    font-size:11px;
    opacity:.65;
}

.input-area{
    display:flex;
    gap:12px;

    padding:18px;

    background:rgba(255,255,255,.03);

    border-top:1px solid rgba(255,255,255,.05);
}

#messageInput{
    flex:1;

    background:#0f172a;

    color:white;

    border:1px solid #334155;

    border-radius:16px;

    padding:14px 18px;

    font-size:15px;

    outline:none;

    transition:.2s;
}

#messageInput:focus{
    border-color:var(--primary);
    box-shadow:
      0 0 0 3px rgba(99,102,241,.15);
}

.btn{
    border:none;
    cursor:pointer;

    padding:14px 18px;

    border-radius:16px;

    font-weight:600;

    transition:.2s;
}

.send-btn{
    background:var(--primary);
    color:white;
}

.send-btn:hover{
    background:var(--primary-hover);
    transform:translateY(-2px);
}

.clear-btn{
    background:var(--danger);
    color:white;
}

.clear-btn:hover{
    background:#dc2626;
}

.typing{
    display:flex;
    gap:5px;
    padding:4px;
}

.typing span{
    width:8px;
    height:8px;
    border-radius:50%;
    background:#94a3b8;

    animation:bounce 1.4s infinite;
}

.typing span:nth-child(2){
    animation-delay:.2s;
}

.typing span:nth-child(3){
    animation-delay:.4s;
}

@keyframes bounce{
    0%,80%,100%{
        transform:translateY(0);
        opacity:.4;
    }
    40%{
        transform:translateY(-6px);
        opacity:1;
    }
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(10px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:768px){

    .chat-container{
        width:100vw;
        height:100vh;
        border-radius:0;
    }

    .message{
        max-width:90%;
    }

    .input-area{
        padding:12px;
    }

    .btn{
        padding:12px 14px;
    }
}
</style>

</head>
<body>

<div class="chat-container">

```
<div class="chat-header">
    <div class="header-left">
        <div class="bot-avatar">🤖</div>

        <div class="header-info">
            <h2>AI Assistant</h2>
            <div class="status">● Online</div>
        </div>
    </div>
</div>

<div class="chat-box" id="chatBox"></div>

<div class="input-area">
    <input
        type="text"
        id="messageInput"
        placeholder="Ask me anything..."
    >

    <button
        id="sendButton"
        class="btn send-btn">
        Send
    </button>

    <button
        onclick="clearChat()"
        class="btn clear-btn">
        Clear
    </button>
</div>
```

</div>

<script>

const chatBox = document.getElementById("chatBox");
const messageInput = document.getElementById("messageInput");
const sendButton = document.getElementById("sendButton");

function getTime() {
    return new Date().toLocaleTimeString([], {
        hour: '2-digit',
        minute: '2-digit'
    });
}

function addMessage(text, sender){

    const row = document.createElement("div");
    row.className =
        sender === "user"
        ? "message-row user-row"
        : "message-row bot-row";

    const message = document.createElement("div");
    message.className = `message ${sender}`;

    message.innerHTML = `
        <div>${text}</div>
        <div class="timestamp">${getTime()}</div>
    `;

    row.appendChild(message);

    chatBox.appendChild(row);

    scrollToBottom();

    return row;
}

function addTypingIndicator(){

    const row = document.createElement("div");
    row.className = "message-row bot-row";

    row.innerHTML = `
        <div class="message bot">
            <div class="typing">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    `;

    chatBox.appendChild(row);

    scrollToBottom();

    return row;
}

function scrollToBottom(){
    chatBox.scrollTop = chatBox.scrollHeight;
}

async function clearChat(){

    try{
        await fetch("/clear",{
            method:"POST"
        });
    }catch(e){
        console.error(e);
    }

    chatBox.innerHTML = "";
}

async function sendMessage(){

    const message = messageInput.value.trim();

    if(!message) return;

    addMessage(message,"user");

    messageInput.value = "";

    const typingIndicator = addTypingIndicator();

    try{

        const response = await fetch("/chat",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                message:message
            })
        });

        const data = await response.json();

        typingIndicator.remove();

        addMessage(
            data.response || "No response received.",
            "bot"
        );

    }
    catch(error){

        typingIndicator.remove();

        addMessage(
            "Unable to connect to the server.",
            "bot"
        );

        console.error(error);
    }
}

sendButton.addEventListener(
    "click",
    sendMessage
);

messageInput.addEventListener(
    "keydown",
    function(event){
        if(event.key === "Enter"){
            sendMessage();
        }
    }
);

messageInput.focus();

</script>

</body>
</html>
